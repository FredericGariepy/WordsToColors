<style>
body {
    margin: 0;
    font-family: sans-serif;
}

/* Top fixed display */
#display {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 45vh; /* increased from 35% */
    display: flex;
    flex-direction: column;
    align-items: center;
    background: #fff;
    border-bottom: 2px solid #333;
    box-sizing: border-box;
    padding: 20px;
    z-index: 1000;
}

#display-color {
    width: 95%;
    height: 50%;
    border-radius: 8px;
    margin-bottom: 8px;
    flex-shrink: 0; /* fixed size */
}

#display-text {
    width: 100%;
    overflow-y: auto;
    max-height: 50%;
    text-align: center;
}

#display-word, #display-hex {
    font-weight: bold;
    margin: 2px 0;
}

.display-link {
    display: inline-block;
    padding: 4px 8px;
    border-radius: 4px;
    margin: 2px 4px;
    text-decoration: none;
    font-weight: bold;
}

.oxford { background:#004d99; color:#fff; }
.mw { background:#990000; color:#fff; }
.wiki { background:#006600; color:#fff; }

.wiki-snippet {
    display: block;
    margin-top: 2px;
    font-weight: normal;
    font-size: 0.9em;
    line-height: 1.3;
    color: #333;
}

/* Color grid below fixed display */
#colorField {
    margin-top: 45vh; /* matches fixed display */
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(50px,1fr));
    gap: 4px;
    padding: 8px;
    height: calc(100vh - 45vh);
    overflow-y: auto;
}

.color-box {
    width: 100%;
    padding-bottom: 100%;
    position: relative;
    cursor: pointer;
    border-radius: 4px;
}

.color-box-inner {
    position: absolute;
    top:0; left:0; right:0; bottom:0;
    border-radius:4px;
}
</style>
</head>

        const [word, hex] = line.split(',');
        return { word: word.trim(), hex: hex.trim() };
    });

// --- Hex to HSL conversion for sorting ---
function hexToHSL(H){
    let r=parseInt(H.substring(0,2),16)/255;
    let g=parseInt(H.substring(2,4),16)/255;
    let b=parseInt(H.substring(4,6),16)/255;
    let max=Math.max(r,g,b), min=Math.min(r,g,b);
    let h,s,l=(max+min)/2;
    if(max==min){ h=s=0; }
    else{
        let d=max-min;
        s=l>0.5?d/(2-max-min):d/(max+min);
        switch(max){
            case r:h=(g-b)/d+(g<b?6:0); break;
            case g:h=(b-r)/d+2; break;
            case b:h=(r-g)/d+4; break;
        }
        h/=6;
    }
    return {h:h, s:s, l:l};
}

// --- Keep decode first ---
const firstColor = colorList[0];
const restColors = colorList.slice(1).sort((a,b)=>hexToHSL(a.hex).h - hexToHSL(b.hex).h);
colorList = [firstColor, ...restColors];

// --- DOM refs ---
const colorField = document.getElementById('colorField');
const displayColor = document.getElementById('display-color');
const displayWord = document.getElementById('display-word');
const displayHex = document.getElementById('display-hex');
const displayLinks = document.getElementById('display-links');

// --- Show Oxford link ---
function showOED(word){
    const url=`https://www.oed.com/search/dictionary/?scope=Entries&q=${encodeURIComponent(word)}`;
    const a = document.createElement('a');
    a.href = url;
    a.target="_blank";
    a.className='display-link oxford';
    a.textContent = `Oxford: ${word}`;
    displayLinks.appendChild(a);
}

// --- Merriam-Webster link ---
function showMW(word){
    const url=`https://www.merriam-webster.com/dictionary/${encodeURIComponent(word)}`;
    const a = document.createElement('a');
    a.href=url;
    a.target="_blank";
    a.className='display-link mw';
    a.textContent = `Webster`;
    displayLinks.appendChild(a);
}

// --- Wikipedia summary ---
function showWiki(word){
    const wikiURL=`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(word)}`;
    fetch(wikiURL).then(res=>res.json()).then(data=>{
        if(data.extract){
            let text=data.extract;
            if(text.length>120) text=text.slice(0,120).trim()+"...";
            const link=data.content_urls?.desktop?.page || `https://en.wikipedia.org/wiki/${encodeURIComponent(word)}`;
            
            // Append wiki link first
            const a = document.createElement('a');
            a.href=link;
            a.target="_blank";
            a.className='display-link wiki';
            a.textContent="Wiki Link";
            displayLinks.appendChild(a);

            // Then the snippet below it
            const span = document.createElement('span');
            span.className='wiki-snippet';
            span.textContent=" " + text;
            displayLinks.appendChild(span);
        }
    }).catch(err=>console.error(err));
}

// --- Build the color grid ---
colorList.forEach(item=>{
    const box=document.createElement('div');
    box.className='color-box';
    const inner=document.createElement('div');
    inner.className='color-box-inner';
    inner.style.backgroundColor='#'+item.hex;
    box.appendChild(inner);

    box.addEventListener('click', ()=>{
        displayColor.style.backgroundColor='#'+item.hex;
        displayWord.textContent=item.word;
        displayHex.textContent='#'+item.hex;
        displayLinks.innerHTML="";
        showOED(item.word);
        showMW(item.word);
        showWiki(item.word);
    });

    colorField.appendChild(box);
});

// --- Show first color on load ---
displayColor.style.backgroundColor='#'+firstColor.hex;
displayWord.textContent=firstColor.word;
displayHex.textContent='#'+firstColor.hex;
displayLinks.innerHTML="";
showOED(firstColor.word);
showMW(firstColor.word);
showWiki(firstColor.word);
</script>
</body>
